<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霍格華茲模擬器 - 智慧跑團 GM 完全版 V2.6</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #0d0a06; color: #e0d4b0; font-family: serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0d0a06; }
  ::-webkit-scrollbar-thumb { background: #3a2e1e; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #c9a84c; }
</style>
</head>
<body class="p-2 sm:p-4 md:p-8 min-h-screen flex flex-col justify-between">

  <div class="max-w-5xl mx-auto w-full bg-[#12100c] border border-[#3a2e1e] p-3 sm:p-6 rounded-lg shadow-2xl flex flex-col justify-between min-h-[90vh]">
    
    <div>
      <h1 class="text-2xl sm:text-3xl font-bold text-[#c9a84c] text-center mb-1">🧙‍♂️ 霍格華茲模擬器</h1>
      <p class="text-[10px] sm:text-xs text-center text-[#8a7a5a] mb-4 sm:mb-6">跨平台沉浸式 TRPG 遊戲引擎 (V2.6 Clean Engine)</p>
    </div>

    <div id="setup-area" class="space-y-4 bg-[#1a1612] p-4 sm:p-6 border border-[#3a2e1e] rounded mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs sm:text-sm font-bold text-[#8a7a5a] mb-1">🔑 輸入 Gemini API Key：</label>
          <input type="password" id="apiKeyInput" class="w-full bg-[#0d0a06] border border-[#3a2e1e] p-2 text-white rounded text-sm placeholder-[#5a4e3b]" placeholder="請輸入您的 API 金鑰 (AIzaSy...)">
        </div>
        <div class="flex gap-2">
          <button onclick="checkArchive()" class="w-1/2 bg-[#3a2e1e] hover:bg-[#5a4e3b] text-[#e0d4b0] font-bold py-2 px-3 rounded text-xs sm:text-sm transition border border-[#5a4e3b]">
            📂 檢查存檔
          </button>
          <button id="btnContinue" onclick="loadGame()" class="w-1/2 bg-[#8a7a5a] text-black font-bold py-2 px-3 rounded text-xs sm:text-sm transition hidden opacity-50 cursor-not-allowed">
            ⏳ 繼續遊戲
          </button>
        </div>
      </div>
      
      <div class="border-t border-[#3a2e1e] pt-4">
        <h3 class="text-sm sm:text-md font-bold text-[#c9a84c] mb-3">✨ 開設新遊戲與世界線設定</h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
          <div>
            <label class="block text-[11px] font-bold text-[#8a7a5a] mb-1">世界線劇情：</label>
            <select id="world-plot" class="w-full bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white">
              <option value="A">模式 A：生成原著主線劇情</option>
              <option value="B">模式 B：純自由原創劇情</option>
            </select>
          </div>
          <div>
            <label class="block text-[11px] font-bold text-[#8a7a5a] mb-1">角色庫範圍 (NPC)：</label>
            <select id="world-npc" class="w-full bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white">
              <option value="1">模式 1：完全比照原著 NPC</option>
              <option value="2">模式 2：混搭全新原創 AI 角色</option>
              <option value="3">模式 3：僅教職員原著，學生全原創</option>
              <option value="4">模式 4：全原創 NPC</option>
            </select>
          </div>
          <div>
            <label class="block text-[11px] font-bold text-[#8a7a5a] mb-1">斜角巷起跑：</label>
            <select id="world-diagon" class="w-full bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white">
              <option value="yes">是：體驗斜角巷採買與火車</option>
              <option value="no">否：極速快轉大禮堂開局</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
          <input type="text" id="char-name" class="bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white" placeholder="巫師姓名 (如: 哈利·波特)">
          <select id="char-gender" class="bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white">
            <option value="男">男巫</option>
            <option value="女">女巫</option>
            <option value="非二元">非二元</option>
          </select>
          <select id="char-blood" class="bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white">
            <option value="純血">純血家族 (Pure-blood)</option>
            <option value="混血">混血巫師 (Half-blood)</option>
            <option value="麻瓜出生">麻瓜出生 (Muggle-born)</option>
          </select>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          <input type="text" id="char-love" class="bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white" placeholder="預設戀愛對象設定 (選填)">
          <input type="text" id="char-background" class="bg-[#0d0a06] border border-[#3a2e1e] p-2 rounded text-xs sm:text-sm text-white" placeholder="其他背景自創故事/祕密 (選填)">
        </div>

        <button onclick="lockAndStart()" class="w-full bg-[#c9a84c] hover:bg-[#e8c96a] text-black font-bold py-3 rounded text-xs sm:text-sm transition tracking-wider">
          ✨ 鎖定世界線並初始化開局
        </button>
      </div>
    </div>

    <div id="game-panel" class="hidden space-y-3">
      
      <div class="grid grid-cols-2 md:grid-cols-6 gap-2 text-center bg-[#1a1612] p-2.5 border border-[#3a2e1e] rounded text-[11px] sm:text-xs">
        <div class="text-left md:text-center">🧙‍♂️ 姓名: <span id="ui-name" class="text-white font-bold">-</span></div>
        <div class="text-right md:text-center">🩸 血統: <span id="ui-blood" class="text-white font-bold">-</span></div>
        <div class="text-left md:text-center">城堡: <span id="ui-house" class="text-[#c9a84c] font-bold">尚未分院</span></div>
        <div class="text-right md:text-center">📅 時間: <span id="ui-time" class="text-white font-bold">-</span></div>
        <div class="text-left md:text-center">⏳ 額度: <span id="ui-quota" class="text-[#e8c96a] font-bold">-</span></div>
        <div class="text-right md:text-center">💰 財富: <span id="ui-money" class="text-[#e8c96a] font-bold">-</span></div>
      </div>

      <div class="grid grid-cols-3 md:grid-cols-6 gap-1.5 text-center bg-[#0d0a06] p-2 border border-[#3a2e1e] rounded text-[10px] sm:text-xs">
        <div class="p-1 border border-[#1a1612]">🔮 魅力: <span id="stat-cha" class="text-[#e8c96a] font-bold">-</span><br><span id="mod-cha" class="text-[9px] text-[#8a7a5a]">-</span></div>
        <div class="p-1 border border-[#1a1612]">🛡️ 意志: <span id="stat-wil" class="text-[#e8c96a] font-bold">-</span><br><span id="mod-wil" class="text-[9px] text-[#8a7a5a]">-</span></div>
        <div class="p-1 border border-[#1a1612]">🧠 智慧: <span id="stat-int" class="text-[#e8c96a] font-bold">-</span><br><span id="mod-int" class="text-[9px] text-[#8a7a5a]">-</span></div>
        <div class="p-1 border border-[#1a1612]">🦁 學院分:<br><span id="ui-score" class="text-[#c9a84c] font-bold">0</span></div>
        <div class="p-1 border border-[#1a1612]">🖤 黑魔法:<br><span id="stat-dark" class="text-red-400 font-bold">0</span></div>
        <div class="p-1 border border-[#1a1612]">🩹 狀態:<br><span id="ui-status" class="text-green-400 font-bold text-[9px]">良好</span></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <div id="left-schedule-panel" class="hidden lg:col-span-4 space-y-3 bg-[#1a1612] p-3 border border-[#3a2e1e] rounded max-h-[220px] lg:max-h-[500px] overflow-y-auto">
          <h4 id="schedule-title" class="text-xs font-bold text-[#c9a84c] border-b border-[#3a2e1e] pb-1">📅 階段一：平日課表時段探索</h4>
          <div id="schedule-area" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-1.5 pt-1.5"></div>
          
          <div class="border-t border-[#3a2e1e] pt-2 grid grid-cols-2 lg:grid-cols-1 gap-2">
            <div>
              <h5 class="text-[10px] font-bold text-[#8a7a5a] mb-0.5">🎒 背包與道具：</h5>
              <div id="ui-inventory" class="text-[10px] text-[#e0d4b0] space-y-0.5 bg-[#0d0a06] p-1.5 rounded h-16 overflow-y-auto">無道具</div>
            </div>
            <div>
              <h5 class="text-[10px] font-bold text-[#8a7a5a] mb-0.5">🪄 技能與熟練度：</h5>
              <div id="ui-skills" class="text-[10px] text-[#e0d4b0] space-y-0.5 bg-[#0d0a06] p-1.5 rounded h-16 overflow-y-auto">無技能</div>
            </div>
          </div>
        </div>

        <div id="right-narrative-panel" class="lg:col-span-12 flex flex-col justify-between">
          <div id="gameLog" class="h-64 sm:h-80 lg:h-[340px] overflow-y-auto bg-[#0d0a06] border border-[#3a2e1e] p-3 sm:p-4 rounded mb-2 text-xs sm:text-sm leading-relaxed"></div>
          
          <div id="sorting-panel" class="hidden bg-[#1a1612] p-3 border border-[#c9a84c] rounded mb-2 text-center space-y-2">
            <p class="text-[11px] sm:text-xs text-[#c9a84c] font-bold">✨ 分類帽：『你想去哪個學院？』(玩家最高選擇權)</p>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
              <button onclick="selectHouse('Gryffindor', '葛來分多')" class="bg-[#7f1d1d] hover:bg-red-700 text-white font-bold py-2 rounded text-xs transition">🦁 葛來分多</button>
              <button onclick="selectHouse('Slytherin', '史萊哲林')" class="bg-[#14532d] hover:bg-green-700 text-white font-bold py-2 rounded text-xs transition">🐍 史萊哲林</button>
              <button onclick="selectHouse('Ravenclaw', '雷文克勞')" class="bg-[#1e3a8a] hover:bg-blue-700 text-white font-bold py-2 rounded text-xs transition">🦅 雷文克勞</button>
              <button onclick="selectHouse('Hufflepuff', '赫夫帕夫')" class="bg-[#713f12] hover:bg-yellow-700 text-white font-bold py-2 rounded text-xs transition">🦡 赫夫帕夫</button>
            </div>
          </div>

          <div id="chipsArea" class="flex flex-col sm:flex-row flex-wrap gap-1.5 mb-2"></div>

          <div class="flex flex-col sm:flex-row gap-2">
            <div class="flex-1 flex gap-2">
              <input type="text" id="playerInput" class="flex-1 bg-[#0d0a06] border border-[#3a2e1e] p-2.5 sm:p-3 rounded text-xs sm:text-sm text-white focus:outline-none focus:border-[#c9a84c]" placeholder="輸入你想執行的魔法或作戰策略...">
              <button onclick="sendActionToGemini()" id="btnSend" class="bg-[#8a7a5a] text-black font-bold px-4 sm:px-6 py-2.5 sm:py-3 rounded text-xs sm:text-sm transition tracking-wider flex items-center gap-1 shrink-0">
                💬 送出行動
              </button>
            </div>
            <button onclick="resetGame()" class="bg-[#3a2e1e] hover:bg-red-900 border border-[#5a4e3b] text-[#e0d4b0] text-center font-bold px-3 py-2 sm:py-3 rounded text-xs transition shrink-0">
              🔮 重置記憶
            </button>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script>
    let gameState = {
      apiKey: "",
      worldLine: { plot: "A", npc: "1", diagon: "yes" },
      player: {
        name: "", gender: "", blood: "", love: "", background: "",
        house: "尚未分院", houseId: "",
        year: 1, chapter: 1, quota: 5, phase: 1,
        money_nat: 3451,
        score: 0, dark_inclination: 0,
        status: ["良好"]
      },
      stats: { charm: 10, willpower: 10, wisdom: 10 },
      inventory: [{ id: "wand_standard", name: "標準奧利凡德魔杖", quantity: 1 }],
      skills: [{ id: "spell_lumos", name: "路摸思 (Lumos)", proficiency: 10, type: "Spells" }],
      npc_database: [],
      clues: [],
      conversationHistory: []
    };

    let globalSystemPrompt = "";
    // 修正點：初始狀態強制為 false，確保一進遊戲時按鈕外觀為標準的「💬 送出行動」
    let currentCheckRequirements = { active_check_required: false, attribute: "willpower", base_DC: 12 };

    function checkArchive() {
      const saved = localStorage.getItem("hogwarts_simulator_v2_save");
      const btnContinue = document.getElementById("btnContinue");
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.player && parsed.player.name) {
            btnContinue.classList.remove("hidden", "opacity-50", "cursor-not-allowed");
            btnContinue.classList.add("bg-[#c9a84c]", "hover:bg-[#e8c96a]", "text-black");
            alert(`【存檔校驗成功】偵測到第 ${parsed.player.year} 學年巫師 [${parsed.player.name}]。`);
            return;
          }
        } catch (e) {
          localStorage.removeItem("hogwarts_simulator_v2_save");
        }
      }
      alert("查無既存存檔，請填寫欄位開設新遊戲。");
    }

    function saveGame() {
      localStorage.setItem("hogwarts_simulator_v2_save", JSON.stringify(gameState));
    }

    function loadGame() {
      const saved = localStorage.getItem("hogwarts_simulator_v2_save");
      if (!saved) return;
      gameState = JSON.parse(saved);
      document.getElementById("apiKeyInput").value = gameState.apiKey;
      
      document.getElementById("setup-area").classList.add("hidden");
      document.getElementById("game-panel").classList.remove("hidden");
      
      updateUI();
      logToGame(`<p class="text-green-400">【系統】記憶水晶加載完畢。歡迎回到霍格華茲，${gameState.player.name}。</p>`);
      renderSchedulePanel();
    }

    function resetGame() {
      if (confirm("✨ 確定要對自己施展「空空，遺忘」嗎？這將會完全清除本地進度並返回主畫面！")) {
        localStorage.removeItem("hogwarts_simulator_v2_save");
        window.location.reload();
      }
    }

    function getModifier(val) {
      if (val >= 100) return 3;
      if (val >= 80) return 2;
      if (val >= 50) return 1;
      return 0;
    }

    function updateUI() {
      document.getElementById("ui-name").innerText = gameState.player.name;
      document.getElementById("ui-blood").innerText = gameState.player.blood;
      document.getElementById("ui-house").innerText = gameState.player.house;
      document.getElementById("ui-time").innerText = `W${gameState.player.chapter} Y${gameState.player.year}`;
      document.getElementById("ui-quota").innerText = `${gameState.player.quota}/5 (${gameState.player.phase === 1 ? '平日' : '假日'})`;
      
      let total_nat = gameState.player.money_nat;
      let g = Math.floor(total_nat / 493);
      let rem = total_nat % 493;
      let s = Math.floor(rem / 23);
      let n = rem % 23;
      document.getElementById("ui-money").innerText = `${g}G ${s}S ${n}K`;

      document.getElementById("stat-cha").innerText = gameState.stats.charm;
      document.getElementById("mod-cha").innerText = `+${getModifier(gameState.stats.charm)}`;
      document.getElementById("stat-wil").innerText = gameState.stats.willpower;
      document.getElementById("mod-wil").innerText = `+${getModifier(gameState.stats.willpower)}`;
      document.getElementById("stat-int").innerText = gameState.stats.wisdom;
      document.getElementById("mod-int").innerText = `+${getModifier(gameState.stats.wisdom)}`;
      
      document.getElementById("ui-score").innerText = gameState.player.score;
      document.getElementById("stat-dark").innerText = gameState.player.dark_inclination;
      document.getElementById("ui-status").innerText = gameState.player.status.join(",");

      const invDiv = document.getElementById("ui-inventory");
      invDiv.innerHTML = gameState.inventory.map(i => `<div>📦 ${i.name} x${i.quantity}</div>`).join("") || "空無一物";
      const sklDiv = document.getElementById("ui-skills");
      sklDiv.innerHTML = gameState.skills.map(s => `<div>🪄 ${s.name} ${s.proficiency}%</div>`).join("") || "尚無解鎖技能";

      const leftPanel = document.getElementById("left-schedule-panel");
      const rightPanel = document.getElementById("right-narrative-panel");

      if (gameState.player.houseId === "") {
        leftPanel.classList.add("hidden");
        leftPanel.classList.remove("lg:col-span-4");
        rightPanel.classList.replace("lg:col-span-8", "lg:col-span-12");
      } else {
        leftPanel.classList.remove("hidden");
        leftPanel.classList.add("lg:col-span-4");
        rightPanel.classList.replace("lg:col-span-12", "lg:col-span-8");
      }

      const btnSend = document.getElementById("btnSend");
      if (currentCheckRequirements.active_check_required) {
        btnSend.innerText = "🎲 執行檢定 (D20)";
        btnSend.className = "bg-[#c9a84c] hover:bg-[#e8c96a] text-black font-bold px-4 sm:px-6 py-2.5 sm:py-3 rounded text-xs sm:text-sm transition tracking-wider flex items-center gap-1 shrink-0 animate-pulse";
      } else {
        btnSend.innerText = "💬 送出行動";
        btnSend.className = "bg-[#8a7a5a] hover:bg-[#a3916b] text-black font-bold px-4 sm:px-6 py-2.5 sm:py-3 rounded text-xs sm:text-sm transition tracking-wider flex items-center gap-1 shrink-0";
      }
    }

    function lockAndStart() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      const name = document.getElementById('char-name').value.trim();
      if (!apiKey) return alert('請先輸入您的 Gemini API Key！');
      if (!name) return alert('請填寫您的巫師姓名！');

      localStorage.removeItem("hogwarts_simulator_v2_save");

      gameState.apiKey = apiKey;
      gameState.worldLine.plot = document.getElementById("world-plot").value;
      gameState.worldLine.npc = document.getElementById("world-npc").value;
      gameState.worldLine.diagon = document.getElementById("world-diagon").value;

      gameState.player.name = name;
      gameState.player.gender = document.getElementById("char-gender").value;
      gameState.player.blood = document.getElementById("char-blood").value;
      gameState.player.love = document.getElementById("char-love").value;
      gameState.player.background = document.getElementById("char-background").value;

      gameState.stats.charm = Math.floor(Math.random() * 21) + 10;
      gameState.stats.willpower = Math.floor(Math.random() * 21) + 10;
      gameState.stats.wisdom = Math.floor(Math.random() * 21) + 10;

      // 喚醒主要遊戲面板，同時 updateUI() 會確保課表完全被隱蔽
      document.getElementById("setup-area").classList.add("hidden");
      document.getElementById("game-panel").classList.remove("hidden");
      
      // 清空日誌框，準備注入真正的第一章內容
      document.getElementById('gameLog').innerHTML = "";
      updateUI();

      globalSystemPrompt = `你是一個極致沉浸的霍格華茲模擬器遊戲引擎與最高GM。
【重要規範】：你負責扮演 GM。每次回傳請嚴格生成符合格式的 JSON。包含 narrative_text 與 suggested_actions (3個建議選項)。
【新增指令要求】：你必須決定下一次玩家的行動是否需要進行「骰點檢定」。如果需要（如施展高難度魔咒、對抗、潛入等），請在 JSON 中將 requires_check 設為 true，並指定對應的 attribute (wisdom/willpower/charm) 與 base_DC。若只是普通的交談、採買、散步，請將 requires_check 設為 false。
【語系與譯名鐵律】：完全使用台灣繁體中文（葛來分多、史萊哲林、雷文克勞、赫夫帕夫、斜角巷、活米村、鄧不利多、石內卜、麥教授、妙麗）。絕對禁止使用格蘭芬多、斯萊特林等大陸或網絡譯名。
【日常敘事限制】：字數控制在 150 - 200 字內，英式冷幽默風格。不透露後台數值。`;

      logToGame(`<p class="text-[#8a7a5a]">【系統】魔法網絡建立中，正在開啟校園大門...</p>`);

      if (gameState.worldLine.diagon === "yes") {
        sendActionToGemini("【系統初始化啟動】：請讀取主角背景，為玩家生成第一封霍格華茲入學通知信（200字內），引導玩家體驗里程碑 5-A：前往斜角巷採買魔杖與日常物資。並在末尾提供3個不同的行動晶片選項。");
      } else {
        sendActionToGemini("【系統初始化啟動】：快速快轉。請一筆帶過入學通知與採買旅程，小說文本開頭即是玩家已經站在大禮堂的雙扇大門前，準備進行分院儀式。");
      }
      
      renderSchedulePanel();
    }

    function renderSchedulePanel() {
      const area = document.getElementById("schedule-area");
      const title = document.getElementById("schedule-title");
      area.innerHTML = "";

      if (gameState.player.phase === 1) {
        title.innerText = "📅 階段一：平日課表時段探索 (選5次)";
        const coreClasses = [
          { name: "🔮 符咒學 (Charms)", id: "class_charms" },
          { name: "🍃 藥草學 (Herbology)", id: "class_herbology" },
          { name: "🛡️ 黑魔法防禦 (DADA)", id: "class_dada" },
          { name: "🧪 魔藥學 (Potions)", id: "class_potions" },
          { name: "城堡密道探索", id: "explore_castle" }
        ];
        coreClasses.forEach(c => {
          area.innerHTML += `<button onclick="selectSchedule('${c.name}', '${c.id}')" class="w-full text-left bg-[#0d0a06] hover:bg-[#3a2e1e] border border-[#3a2e1e] p-2 rounded text-xs text-[#e0d4b0] transition flex justify-between items-center">
            <span>${c.name}</span> <span class="text-[10px] text-[#8a7a5a] shrink-0">1 額度</span>
          </button>`;
        });
      } else {
        title.innerText = "📆 階段二：週末假日自由時間 (選1次)";
        const weekendActivities = [
          { name: "🍻 活米村三根掃帚", id: "holiday_hogsmeade" },
          { name: "🧹 魁地奇球場練習", id: "holiday_quidditch" },
          { name: "📚 圖書館深度溫書", id: "holiday_library" }
        ];
        weekendActivities.forEach(a => {
          area.innerHTML += `<button onclick="selectSchedule('${a.name}', '${a.id}')" class="w-full text-left bg-[#1a1612] hover:bg-[#5a4e3b] border border-[#c9a84c] p-2 rounded text-xs text-[#e8c96a] transition flex justify-between items-center">
            <span>${a.name}</span> <span class="text-[10px] text-[#c9a84c] shrink-0">假日額度</span>
          </button>`;
        });
      }
    }

    function selectSchedule(name, id) {
      if (gameState.player.quota <= 0) {
        alert("本階段行動額度已耗盡！");
        return;
      }
      currentCheckRequirements.active_check_required = true;
      currentCheckRequirements.attribute = id.includes("potions") || id.includes("library") ? "wisdom" : "willpower";
      currentCheckRequirements.base_DC = 11 + gameState.player.year;
      
      sendActionToGemini(`前往執行：${name}。`);
    }

    function clickChip(text) {
      sendActionToGemini(text);
    }

    async function sendActionToGemini(forcedText = null) {
      const playerInput = document.getElementById('playerInput');
      let text = forcedText || playerInput.value.trim();
      const btnSend = document.getElementById('btnSend');

      if (!text) return alert('請輸入行動或點選建議晶片！');

      btnSend.disabled = true;
      btnSend.innerText = '⏳';

      let diceRoll = 0;
      let modifierBonus = 0;
      let totalPreScore = 0;
      let finalDecision = "none"; 

      if (!forcedText && currentCheckRequirements.active_check_required) {
        gameState.player.quota--;
        diceRoll = Math.floor(Math.random() * 20) + 1;
        
        let attr = currentCheckRequirements.attribute;
        let statVal = gameState.stats[attr] || 10;
        modifierBonus = getModifier(statVal);
        
        if (gameState.player.status.includes("受傷") || gameState.player.status.includes("魔力透支")) {
          modifierBonus -= 2;
        }

        totalPreScore = diceRoll + modifierBonus;
        let dc = currentCheckRequirements.base_DC;

        if (diceRoll === 20) finalDecision = "critical_success";
        else if (diceRoll === 1) finalDecision = "critical_failure";
        else if (totalPreScore >= dc + 5) finalDecision = "critical_success";
        else if (totalPreScore < dc) finalDecision = (dc - totalPreScore >= 5) ? "critical_failure" : "failure";
        else finalDecision = "success";

        logToGame(`<p class="text-[#e8c96a] mt-3"><b>🎲 命運檢定：</b>${text} <span class="text-[10px] text-[#8a7a5a]">(骰點: ${diceRoll} + 修正: ${modifierBonus} = 總分 ${totalPreScore} vs DC: ${dc})</span></p>`);
        playerInput.value = '';
      } else {
        if (!forcedText) {
          logToGame(`<p class="text-[#e0d4b0] mt-3"><b>💬 你的行動：</b>${text}</p>`);
          playerInput.value = '';
        }
      }

      let runtimeInstruction = (finalDecision === "none") ? "" : `\n【天命裁判指令】：此輪挑戰已被前端宣判為「${finalDecision}」。請編織符合結局的情節。`;
      gameState.conversationHistory.push({ role: 'user', parts: [{ text: text + runtimeInstruction }] });

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gameState.apiKey}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: gameState.conversationHistory,
            systemInstruction: { parts: [{ text: globalSystemPrompt }] },
            generationConfig: {
              temperature: 0.7,
              responseMimeType: 'application/json',
              responseSchema: {
                type: 'OBJECT',
                properties: {
                  narrative_text: { type: 'STRING' },
                  suggested_actions: { type: 'ARRAY', items: { type: 'STRING' } },
                  requires_check: { type: 'BOOLEAN' },
                  attribute: { type: 'STRING' },
                  base_DC: { type: 'INTEGER' },
                  house_points_delta: { type: 'INTEGER' },
                  dark_delta: { type: 'INTEGER' },
                  add_inventory_id: { type: 'STRING' },
                  add_inventory_name: { type: 'STRING' }
                },
                required: ['narrative_text', 'suggested_actions', 'requires_check']
              }
            }
          })
        });

        const data = await response.json();
        if (data.candidates && data.candidates[0].content.parts[0].text) {
          const rawJsonText = data.candidates[0].content.parts[0].text;
          const gameObject = JSON.parse(rawJsonText);

          logToGame(`<p class="text-[#e0d4b0] mt-2">${gameObject.narrative_text}</p>`);
          gameState.conversationHistory.push({ role: 'model', parts: [{ text: rawJsonText }] });

          currentCheckRequirements.active_check_required = gameObject.requires_check || false;
          currentCheckRequirements.attribute = gameObject.attribute || "willpower";
          currentCheckRequirements.base_DC = gameObject.base_DC || 12;

          if (gameObject.house_points_delta) gameState.player.score += gameObject.house_points_delta;
          if (gameObject.dark_delta) gameState.player.dark_inclination += gameObject.dark_delta;
          if (gameObject.add_inventory_id) {
            gameState.inventory.push({ id: gameObject.add_inventory_id, name: gameObject.add_inventory_name || "魔法物品", quantity: 1 });
          }

          if (gameObject.narrative_text.includes("分類帽") || gameObject.narrative_text.includes("分院儀式")) {
            if (gameState.player.houseId === "") {
              document.getElementById("sorting-panel").classList.remove("hidden");
            }
          }

          const chipsArea = document.getElementById('chipsArea');
          chipsArea.innerHTML = '';
          gameObject.suggested_actions.forEach(act => {
            chipsArea.innerHTML += `<button onclick="clickChip('${act}')" class="w-full sm:w-auto text-left sm:text-center bg-[#1a1612] hover:bg-[#3a2e1e] border border-[#3a2e1e] text-xs px-3 py-2 rounded text-[#e0d4b0] transition block truncate">${act}</button>`;
          });

          if (gameState.player.houseId !== "") {
            handlePhaseProgression();
          }
        }
      } catch (error) {
        logToGame(`<p class="text-red-400 mt-2">【連線異常】魔力不穩定，請重新發送行動。</p>`);
      } finally {
        btnSend.disabled = false;
        updateUI();
        saveGame();
      }
    }

    function handlePhaseProgression() {
      if (gameState.player.quota <= 0) {
        if (gameState.player.phase === 1) {
          gameState.player.phase = 2;
          gameState.player.quota = 1;
          logToGame(`<p class="text-[#c9a84c] mt-2 text-xs">✨ 【時間流逝】平日課表結束，週末假日自由時間解鎖！</p>`);
        } else {
          settleWeeklyChapter();
        }
        renderSchedulePanel();
      }
    }

    function settleWeeklyChapter() {
      gameState.player.chapter++;
      gameState.player.phase = 1;
      gameState.player.quota = 5;
      logToGame(`<p class="text-[#8a7a5a] mt-3 p-2 bg-[#1a1612] border border-[#3a2e1e] text-xs rounded">📝 【第 ${gameState.player.chapter - 1} 週章節結算】進入新的一週...</p>`);

      if (gameState.player.chapter > 10) {
        gameState.player.year++;
        gameState.player.chapter = 1;
        logToGame(`<p class="text-white font-bold text-center mt-3 text-sm">🏆 升級至第 ${gameState.player.year} 學年！</p>`);
      }
    }

    function selectHouse(houseId, houseName) {
      gameState.player.houseId = houseId;
      gameState.player.house = houseName;
      document.getElementById("ui-house").innerText = houseName;
      document.getElementById("sorting-panel").classList.add("hidden");

      logToGame(`<p class="text-md font-bold text-[#c9a84c] mt-3 text-center">🎩 『那就是——${houseName}！』</p>`);
      gameState.conversationHistory = [];
      saveGame();
      sendActionToGemini(`【分院正式固化確認】：玩家已加入${houseName}。請以該學院一年級新生起點正式開啟「第 1 章（第 1 週）」校園生活。`);
    }

    function logToGame(htmlContent) {
      const gameLog = document.getElementById('gameLog');
      gameLog.innerHTML += htmlContent;
      gameLog.scrollTop = gameLog.scrollHeight;
    }
  </script>
</body>
</html>
